name: Auto Edit update&close.json

on:
  schedule:
    # Lankawe Ude 7:30 AM (UTC: 2:00 AM)
    - cron: '0 2 * * *'
    # Lankawe Ude 8:00 AM (UTC: 2:30 AM)
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Edit Script
        run: node edit.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "file/beta/update&close.json"
          git commit -m "Auto-updated showDialog status" || echo "No changes to commit"
          git push
